<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="overlay d-flex justify-content-center align-items-center min-vh-100">

<div class="login-box" style="width:420px; background:rgb(229, 229, 234); padding:35px; border-radius:15px;">

<img src="{{ url_for('static', filename='images/college_logo.png') }}" class="logo">

<h2>College Event Management</h2>

<h4>Login</h4>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}

<div class="alert alert-{{ category }}">
{{ message }}
</div>

{% endfor %}
{% endif %}
{% endwith %}

<form method="POST" autocomplete="off">

<div class="mb-3">

<input
type="email"
name="email"
class="form-control"
placeholder="Email Address"
required>

</div>

<div class="mb-3">

<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required>

</div>

<button
type="submit"
class="btn btn-primary w-100">

Login

</button>

</form>

<div class="text-center mt-3">

<a href="{{ url_for('forgot_password') }}">

Forgot Password?

</a>

</div>

<hr>

<div class="text-center">

Don't have an account?

<a href="{{ url_for('register') }}">

Create New Account

</a>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
