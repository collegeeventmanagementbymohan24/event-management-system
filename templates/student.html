<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="overlay">

<div class="container">

<div class="glass-box" style="max-width:1100px;width:100%;">

<div class="text-center">

<img src="{{ url_for('static', filename='images/college_logo.png') }}" class="logo">

<h2>Student Dashboard</h2>

<h5>Welcome, {{ session['name'] }} 👋</h5>

<p>College Event Management System</p>

</div>

<hr>

<div class="row text-center">

<div class="col-md-6 mb-4">

<div class="card shadow-lg border-0 bg-primary text-white">

<div class="card-body">

<i class="fas fa-calendar-alt fa-3x mb-3"></i>

<h4>Total Events</h4>

<h1>{{ total_events }}</h1>

</div>

</div>

</div>

<div class="col-md-6 mb-4">

<div class="card shadow-lg border-0 bg-success text-white">

<div class="card-body">

<i class="fas fa-user-check fa-3x mb-3"></i>

<h4>My Registrations</h4>

<h1>{{ my_events }}</h1>

</div>

</div>

</div>

</div>

<hr>

<div class="row">

<div class="col-md-4 mb-3">

<a href="/student_events" class="btn btn-primary w-100 p-3">

<i class="fas fa-calendar"></i>

Browse Events

</a>

</div>

<div class="col-md-4 mb-3">

<a href="/my_registrations" class="btn btn-success w-100 p-3">

<i class="fas fa-list"></i>

My Registrations

</a>

</div>

<div class="col-md-4 mb-3">

<a href="/logout" class="btn btn-danger w-100 p-3">

<i class="fas fa-sign-out-alt"></i>

Logout

</a>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
