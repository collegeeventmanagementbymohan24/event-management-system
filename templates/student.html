<!DOCTYPE html>
<html>
<head>

<title>Student Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{

    background:#eef2f7;

}


/* College Logo Watermark */

.watermark{

    position:fixed;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    z-index:0;

}


.watermark img{

    width:350px;

    opacity:0.10;

}



.header{

    background:#2c3e50;

    color:white;

    padding:20px 60px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    position:relative;

    z-index:1;

}


.header h2{

    font-size:30px;

}



.container{

    width:90%;

    margin:50px auto;

    position:relative;

    z-index:1;

}



.cards{

    display:flex;

    justify-content:center;

    gap:30px;

    flex-wrap:wrap;

}



.card{

    width:220px;

    background:white;

    padding:30px;

    text-align:center;

    border-radius:12px;

    box-shadow:0 5px 15px rgba(0,0,0,.2);

    transition:.3s;

}



.card:hover{

    transform:translateY(-8px);

}



.card h3{

    margin:15px 0;

}



.card a{

    text-decoration:none;

    background:#3498db;

    color:white;

    padding:10px 20px;

    border-radius:6px;

    display:inline-block;

}



.card a:hover{

    background:#2980b9;

}



.footer{

    text-align:center;

    margin-top:60px;

    color:gray;

    position:relative;

    z-index:1;

}


</style>

</head>


<body>


<div class="watermark">

<img src="{{ url_for('static', filename='images/log.webp') }}">

</div>



<div class="header">


<h2>🎓 Student Dashboard</h2>


<h3>Welcome {{ session['name'] }}</h3>


</div>




<div class="container">


<div class="cards">


<div class="card">

📅

<h3>View Events</h3>

<a href="/student_events">
Open
</a>

</div>



<div class="card">

📝

<h3>My Registrations</h3>

<a href="/my_registrations">
Open
</a>

</div>




<div class="card">

🚪

<h3>Logout</h3>

<a href="/logout">
Logout
</a>

</div>



</div>


</div>



<div class="footer">

<h3>
College Event Management System ©2026
</h3>

</div>


</body>

</html>
