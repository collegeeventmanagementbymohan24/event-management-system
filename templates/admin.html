<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container py-5">

<div class="glass-box" style="width:100%;max-width:1200px;margin:auto;">

<div class="text-center">

<img src="{{ url_for('static', filename='images/college_logo.png') }}" class="logo">

<h2>Admin Dashboard</h2>

<h5>Welcome, {{ session['name'] }}</h5>

</div>

<hr>

<div class="row text-center">

<div class="col-md-4 mb-3">

<div class="card bg-primary text-white shadow">

<div class="card-body">

<h5>Total Students</h5>

<h2>{{ total_students }}</h2>

</div>

</div>

</div>

<div class="col-md-4 mb-3">

<div class="card bg-success text-white shadow">

<div class="card-body">

<h5>Total Events</h5>

<h2>{{ total_events }}</h2>

</div>

</div>

</div>

<div class="col-md-4 mb-3">

<div class="card bg-warning text-dark shadow">

<div class="card-body">

<h5>Registrations</h5>

<h2>{{ total_registrations }}</h2>

</div>

</div>

</div>

</div>

<hr>

<div class="row">

<div class="col-md-4 mb-3">

<a href="/add_event" class="btn btn-success w-100">
➕ Add Event
</a>

</div>

<div class="col-md-4 mb-3">

<a href="/view_events" class="btn btn-primary w-100">
📅 View Events
</a>

</div>

<div class="col-md-4 mb-3">

<a href="/logout" class="btn btn-danger w-100">
🚪 Logout
</a>

</div>

</div>

</div>

</div>

</body>
</html>
