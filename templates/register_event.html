<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#4e73df,#1cc88a);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial,Helvetica,sans-serif;
        }

        .card{

            width:850px;
            border:none;
            border-radius:20px;
            box-shadow:0px 10px 30px rgba(0,0,0,.25);

        }

        .card-header{

            background:#4e73df;
            color:white;
            text-align:center;
            font-size:28px;
            font-weight:bold;
            border-radius:20px 20px 0 0;
            padding:20px;

        }

        .btn-register{

            background:#1cc88a;
            color:white;
            font-size:18px;
            font-weight:bold;

        }

        .btn-register:hover{

            background:#17a673;
            color:white;

        }

        label{

            font-weight:bold;

        }

    </style>

</head>

<body>

<div class="card">

<div class="card-header">

🎉 Event Registration

</div>

<div class="card-body p-4">

<form method="POST">

<div class="row">

<div class="col-md-12 mb-3">

<label>Event Name</label>

<input type="text"
class="form-control"
value="{{ event[1] }}"
readonly>

</div>

<div class="col-md-6 mb-3">

<label>Student Name</label>

<input type="text"
name="student_name"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Roll Number</label>

<input type="text"
name="roll_no"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<input type="email"
name="email"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Mobile Number</label>

<input type="text"
name="mobile"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Class</label>

<input type="text"
name="student_class"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Branch</label>

<input type="text"
name="branch"
class="form-control"
required>

</div>

<div class="col-md-12 mb-4">

<label>Gender</label>

<select name="gender"
class="form-select"
required>

<option value="">Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="d-grid">

<button class="btn btn-register btn-lg">

Register Event

</button>

</div>

</div>

</form>

</div>

</div>

</body>
</html>
