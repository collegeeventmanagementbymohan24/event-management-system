<!DOCTYPE html>

<html>

<head>

<title>Register</title>

<link rel="stylesheet"
href="{{ url_for('static',filename='css/style.css') }}">

</head>


<body>

<div class="box">

<h2>Register</h2>


<form method="POST">


<input
type="text"
name="name"
placeholder="Full Name"
required>


<input
type="email"
name="email"
placeholder="Email"
required>


<input
type="password"
name="password"
placeholder="Password"
required>


<input type="hidden" name="role" value="Student">


<button type="submit">
Register
</button>


</form>


<p>

Already Registered?

<a href="/login">
Login
</a>

</p>


</div>


</body>

</html>
