<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>


<div class="overlay d-flex justify-content-center align-items-center min-vh-100">

<div class="login-box">

<img src="{{ url_for('static', filename='images/college_logo.png') }}" class="logo">

<h2>College Event Management</h2>

<h4>Create Student Account</h4>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}

<div class="alert alert-{{ category }}">
{{ message }}
</div>

{% endfor %}
{% endif %}
{% endwith %}

<form method="POST" autocomplete="off">

<div class="mb-3">

<input
type="text"
name="name"
class="form-control"
placeholder="Enter Full Name"
required>

</div>

<div class="mb-3">

<input
type="email"
name="email"
class="form-control"
placeholder="Enter Email Address"
required>

</div>

<div class="mb-3">

<input
type="password"
name="password"
class="form-control"
placeholder="Enter Password"
minlength="6"
required>

</div>

<div class="mb-3">

<label class="form-label fw-bold">

Role

</label>

<input
type="text"
class="form-control"
value="Student"
readonly>

<input
type="hidden"
name="role"
value="Student">

</div>

<button
type="submit"
class="btn btn-success w-100">

Register

</button>

</form>

<div class="text-center mt-3">

<a href="{{ url_for('forgot_password') }}">

Forgot Password?

</a>

</div>

<hr>

<div class="text-center">

Already have an account?

<a href="{{ url_for('login') }}">

Login Here

</a>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
