<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Registrations</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="overlay">

<div class="container">

<div class="glass-box" style="width:100%;max-width:1200px;">

<div class="text-center mb-4">

<img src="{{ url_for('static', filename='images/college_logo.png') }}" class="logo">

<h2>My Registered Events</h2>

<p>College Event Management System</p>

</div>

<div class="table-responsive">

<table class="table table-bordered table-hover table-light align-middle">

<thead class="table-dark">

<tr>

<th>#</th>

<th>Event Name</th>

<th>Date</th>

<th>Venue</th>

<th>Registered On</th>

</tr>

</thead>

<tbody>

{% for reg in registrations %}

<tr>

<td>{{ loop.index }}</td>

<td>{{ reg[0] }}</td>

<td>{{ reg[1] }}</td>

<td>{{ reg[2] }}</td>

<td>{{ reg[3] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

<div class="text-center mt-4">

<a href="/student" class="btn btn-secondary">

<i class="fas fa-arrow-left"></i>

Back to Dashboard

</a>

</div>

</div>

</div>

</div>

</body>

</html>
