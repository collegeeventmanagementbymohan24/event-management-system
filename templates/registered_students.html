<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registered Students</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="overlay">

<div class="glass-box" style="width:95%;max-width:1200px;">

<div class="text-center mb-4">

<img src="{{ url_for('static', filename='images/college_logo.png') }}" class="logo">

<h2>Registered Students</h2>

<p>College Event Management System</p>

</div>

<div class="table-responsive">

<table class="table table-bordered table-hover table-light align-middle">

<thead class="table-dark">

<tr>

<th>#</th>

<th>Student Name</th>

<th>Email</th>

<th>Registered On</th>

</tr>

</thead>

<tbody>

{% for student in students %}

<tr>

<td>{{ loop.index }}</td>

<td>{{ student[0] }}</td>

<td>{{ student[1] }}</td>

<td>{{ student[2] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

<div class="text-center mt-4">

<a href="/view_events" class="btn btn-secondary">

⬅ Back to Events

</a>

</div>

</div>

</div>

</body>

</html>
