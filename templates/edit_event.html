<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Event</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="overlay">

<div class="glass-box" style="width:650px;">

<div class="text-center">

<img src="{{ url_for('static', filename='images/college_logo.png') }}" class="logo">

<h2>Edit Event</h2>

<p>Update Event Details</p>

</div>

<form method="POST">

<div class="mb-3">

<label>Event Title</label>

<input
type="text"
name="title"
class="form-control"
value="{{ event[1] }}"
required>

</div>

<div class="mb-3">

<label>Description</label>

<textarea
name="description"
rows="4"
class="form-control"
required>{{ event[2] }}</textarea>

</div>

<div class="mb-3">

<label>Event Date</label>

<input
type="date"
name="event_date"
class="form-control"
value="{{ event[3] }}"
required>

</div>

<div class="mb-3">

<label>Venue</label>

<input
type="text"
name="venue"
class="form-control"
value="{{ event[4] }}"
required>

</div>

<button class="btn btn-warning w-100">

💾 Update Event

</button>

<br><br>

<a href="/view_events" class="btn btn-secondary w-100">

⬅ Back

</a>

</form>

</div>

</div>

</body>

</html>
