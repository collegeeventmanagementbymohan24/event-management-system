<!DOCTYPE html>
<html>
<head>
    <title>Edit Event</title>
</head>
<body>

<h2>Edit Event</h2>

<form method="POST">

    <input type="text" name="title" value="{{ event[1] }}" required><br><br>

    <textarea name="description">{{ event[2] }}</textarea><br><br>

    <input type="date" name="event_date" value="{{ event[3] }}" required><br><br>

    <input type="time" name="event_time" value="{{ event[4] }}" required><br><br>

    <input type="text" name="venue" value="{{ event[5] }}" required><br><br>

    <input type="text" name="category" value="{{ event[6] }}" required><br><br>

    <button type="submit">Update Event</button>

</form>

<br>

<a href="/view_events">Back</a>

</body>
</html>
