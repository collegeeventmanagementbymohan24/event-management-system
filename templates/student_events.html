<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Available Events</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="overlay">

<div class="container">

<div class="glass-box" style="width:100%;max-width:1200px;">

<div class="text-center mb-4">

<img src="{{ url_for('static', filename='images/college_logo.png') }}" class="logo">

<h2>Available Events</h2>

<p>Select an event and register</p>

</div>

<div class="row">

{% for event in events %}

<div class="col-lg-4 col-md-6 mb-4">

<div class="card shadow-lg border-0 h-100">

<div class="card-body">

<h4 class="text-primary">

<i class="fas fa-calendar-alt"></i>

{{ event[1] }}

</h4>

<hr>

<p>

<strong>Description</strong>

<br>

{{ event[2] }}

</p>

<p>

<i class="fas fa-calendar"></i>

<strong>Date:</strong>

{{ event[3] }}

</p>

<p>

<i class="fas fa-map-marker-alt"></i>

<strong>Venue:</strong>

{{ event[4] }}

</p>

<a href="/register_event/{{ event[0] }}"

class="btn btn-success w-100">

<i class="fas fa-user-plus"></i>

Register Now

</a>

</div>

</div>

</div>

{% endfor %}

</div>

<div class="text-center mt-4">

<a href="/student" class="btn btn-secondary">

⬅ Back to Dashboard

</a>

</div>

</div>

</div>

</div>

</body>

</html>
