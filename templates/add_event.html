<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Event</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<div class="mb-3">

<label>Event Time</label>

<input
type="time"
name="event_time"
class="form-control"
required>

</div>
<body>

<div class="overlay">

<div class="glass-box" style="width:600px;">

<div class="text-center">

<img src="{{ url_for('static', filename='images/college_logo.png') }}" class="logo">

<h2>Add New Event</h2>

<p>College Event Management System</p>

</div>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category,message in messages %}

<div class="alert alert-{{category}}">
{{message}}
</div>

{% endfor %}
{% endif %}
{% endwith %}

<form method="POST">

<div class="mb-3">

<label>Event Title</label>

<input
type="text"
name="title"
class="form-control"
placeholder="Enter Event Title"
required>

</div>

<div class="mb-3">

<label>Description</label>

<textarea
name="description"
class="form-control"
rows="4"
placeholder="Enter Event Description"
required></textarea>

</div>

<div class="mb-3">

<label>Event Date</label>

<input
type="date"
name="event_date"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Venue</label>

<input
type="text"
name="venue"
class="form-control"
placeholder="Enter Venue"
required>

</div>

<button class="btn btn-success w-100">

💾 Save Event

</button>

<br><br>

<a href="/admin" class="btn btn-secondary w-100">

⬅ Back to Dashboard

</a>

</form>

</div>

</div>

</body>

</html>
